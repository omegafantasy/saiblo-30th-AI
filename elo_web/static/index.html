<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Saiblo Dashboard</title>
    <link rel="stylesheet" href="/style.css?v=20260509-user-fold" />
  </head>
  <body>
    <header class="header">
      <h1>Saiblo 排名看板</h1>
      <div class="meta">
        <span id="host">host: -</span>
        <span id="generatedAt">更新时间: -</span>
      </div>
      <nav class="board-switcher" aria-label="榜单切换">
        <button type="button" class="nav-btn" id="boardPrev" aria-label="上一页">&lt;-</button>
        <span class="board-current" id="boardCurrent">Game1 Elo</span>
        <button type="button" class="nav-btn" id="boardNext" aria-label="下一页">-&gt;</button>
      </nav>
      <label class="fold-toggle">
        <input type="checkbox" id="foldByUser" checked />
        <span>按用户折叠</span>
      </label>
    </header>

    <main class="container">
      <section class="panel wide" id="panel-saiblo-game1">
        <div class="panel-title">Saiblo Game1 AI 版本 Elo</div>
        <div class="summary" id="summary-saiblo-game1"></div>
        <div class="table-wrap">
          <table id="table-saiblo-game1" class="wide-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>AI</th>
                <th>Code</th>
                <th>Elo</th>
                <th>Raw</th>
                <th>Rel.</th>
                <th>Games</th>
                <th>W-L-D</th>
                <th>Win%</th>
                <th>Score%</th>
                <th>HP</th>
                <th>Rounds</th>
                <th>Ladder</th>
                <th>Last</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel wide" id="panel-saiblo-game53" hidden>
        <div class="panel-title">Saiblo Game53 DeepClue AI 版本平均分</div>
        <div class="summary" id="summary-saiblo-game53"></div>
        <div class="table-wrap">
          <table id="table-saiblo-game53" class="wide-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>AI</th>
                <th>Code</th>
                <th>Avg</th>
                <th>Best</th>
                <th>Min</th>
                <th>Std</th>
                <th>Games</th>
                <th>Rel.</th>
                <th>Last Score</th>
                <th>Best Match</th>
                <th>Last</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="footer">
      自动刷新间隔: 15 秒
    </footer>
    <script src="/app.js?v=20260509-user-fold"></script>
  </body>
</html>
