<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elo Dashboard</title>
    <link rel="stylesheet" href="/style.css?v=20260430-actions" />
  </head>
  <body>
    <header class="header">
      <h1>Elo 排名看板</h1>
      <div class="meta">
        <span id="host">host: -</span>
        <span id="generatedAt">更新时间: -</span>
      </div>
    </header>

    <main class="container">
      <section class="panel" id="panel-prod">
        <div class="panel-title">生产 Elo</div>
        <div class="summary" id="summary-prod"></div>
        <div class="table-wrap">
          <table id="table-prod">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Version</th>
                <th>Elo</th>
                <th>Games</th>
                <th>Win%</th>
                <th>Score%</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel" id="panel-iter">
        <div class="panel-title">迭代 Elo</div>
        <div class="summary" id="summary-iter"></div>
        <div class="table-wrap">
          <table id="table-iter">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Version</th>
                <th>Elo</th>
                <th>Games</th>
                <th>Win%</th>
                <th>Score%</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel wide" id="panel-saiblo-game1">
        <div class="panel-title">Saiblo Game1 AI 版本 Elo</div>
        <div class="summary" id="summary-saiblo-game1"></div>
        <div class="table-wrap">
          <table id="table-saiblo-game1" class="wide-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>AI</th>
                <th>Code</th>
                <th>Elo</th>
                <th>Raw</th>
                <th>Rel.</th>
                <th>Games</th>
                <th>W-L-D</th>
                <th>Win%</th>
                <th>Score%</th>
                <th>HP</th>
                <th>Rounds</th>
                <th>Ladder</th>
                <th>Last</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="footer">
      自动刷新间隔: 15 秒
    </footer>
    <script src="/app.js?v=20260430-actions"></script>
  </body>
</html>
