<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game1 Replay Player</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Game1 Replay Player</h1>
        <p>本地/服务器回放播放器，适配 Game1 JSON 数组 replay。</p>
      </div>
      <div class="topbar-meta">
        <div class="pill" id="replayPathLabel">未加载回放</div>
        <div class="pill" id="seedLabel">Seed: -</div>
      </div>
    </header>

    <section class="loader-panel">
      <div class="input-group wide">
        <label for="pathInput">服务器路径</label>
        <div class="inline-row">
          <input id="pathInput" type="text" placeholder="/www/autolab/runtime/.../replay.json">
          <button id="loadPathBtn">加载路径</button>
        </div>
      </div>
      <div class="input-group">
        <label for="fileInput">本地文件</label>
        <input id="fileInput" type="file" accept=".json,application/json">
      </div>
      <div class="input-group">
        <label for="rootInput">扫描目录</label>
        <div class="inline-row">
          <input id="rootInput" type="text" placeholder="留空则扫描常用 replay 目录">
          <button id="scanBtn">扫描</button>
        </div>
      </div>
    </section>

    <section class="main-grid">
      <div class="board-card">
        <div class="controls">
          <button id="playBtn">播放</button>
          <button id="pauseBtn">暂停</button>
          <button id="prevBtn">上一回合</button>
          <button id="nextBtn">下一回合</button>
          <label>倍速
            <select id="speedSelect">
              <option value="0.25">0.25x</option>
              <option value="0.5">0.5x</option>
              <option value="1" selected>1x</option>
              <option value="2">2x</option>
              <option value="4">4x</option>
              <option value="8">8x</option>
            </select>
          </label>
          <label>跳转
            <input id="jumpInput" type="number" min="0" step="1" value="0">
          </label>
          <button id="jumpBtn">跳转</button>
        </div>
        <div class="slider-row">
          <span id="roundLabel">Round 0 / 0</span>
          <input id="timeline" type="range" min="0" max="0" step="1" value="0">
        </div>
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="boardCanvas" width="1200" height="1200"></canvas>
        </div>
      </div>

      <aside class="sidebar">
        <section class="panel">
          <h2>对局概览</h2>
          <div class="overview-grid">
            <div class="kv"><span>当前回合</span><strong id="overviewRound">0</strong></div>
            <div class="kv"><span>总帧数</span><strong id="overviewTotal">0</strong></div>
            <div class="kv"><span>Winner</span><strong id="winnerLabel">-</strong></div>
            <div class="kv"><span>当前操作</span><strong id="opsCountLabel">0</strong></div>
          </div>
        </section>

        <section class="panel players-panel">
          <h2>双方状态</h2>
          <div class="player-card player0">
            <h3>Player 0</h3>
            <div class="stats-grid" id="player0Stats"></div>
          </div>
          <div class="player-card player1">
            <h3>Player 1</h3>
            <div class="stats-grid" id="player1Stats"></div>
          </div>
        </section>

        <section class="panel">
          <h2>超武信息</h2>
          <div id="weaponPanel"></div>
        </section>

        <section class="panel">
          <h2>本回合操作</h2>
          <div class="ops-columns">
            <div>
              <h3 class="ops-head red">Player 0</h3>
              <ul id="op0List" class="ops-list"></ul>
            </div>
            <div>
              <h3 class="ops-head blue">Player 1</h3>
              <ul id="op1List" class="ops-list"></ul>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>选中格子</h2>
          <div id="selectionPanel" class="selection-panel">点击棋盘查看格子、蚂蚁和塔信息。</div>
        </section>

        <section class="panel file-panel">
          <h2>Replay 列表</h2>
          <div id="fileList" class="file-list"></div>
        </section>
      </aside>
    </section>
  </div>
  <script src="/app.js"></script>
</body>
</html>
